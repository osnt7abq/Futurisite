<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futurisite | Winter '26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Inter:wght@300;600&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        .renaissance-font { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-text { background: linear-gradient(135deg, #D4AF37 0%, #FFF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center glass">
        <div class="text-xl font-black tracking-tighter italic gold-text">WINTER '26</div>
        <div class="w-6 h-0.5 bg-white"></div>
    </nav>

    <!-- Hero Section (Florence Skyline) -->
    <section class="relative h-[80vh] flex items-end p-8 pb-20 overflow-hidden">
        <img src="https://images.unsplash.com/photo-1533105079780-92b9be482077?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="relative z-10">
            <h1 class="text-6xl renaissance-font font-black leading-tight mb-4">The New <br><span class="italic font-light">Elegance.</span></h1>
            <p class="text-gray-400 text-sm max-w-xs mb-8">Fusing classical artistry with autonomous commerce. Built for the 2026 Shopify Winter Edition.</p>
            <button class="bg-white text-black px-12 py-4 text-xs font-black uppercase tracking-widest">Explore Edition</button>
        </div>
    </section>

    <!-- Content Grid -->
    <section class="p-4 py-12 space-y-4">
        
        <!-- Large Card (Ceiling Art) -->
        <div class="glass rounded-[40px] overflow-hidden p-2">
            <img src="https://images.unsplash.com/photo-1615529151169-7b1ff50dc7f2?q=80&w=2000" class="w-full h-72 object-cover rounded-[32px] opacity-80">
            <div class="p-8">
                <h2 class="text-3xl renaissance-font mb-2">Divine Intelligence</h2>
                <p class="text-gray-500 text-sm">Autonomous scale through master-crafted logic.</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <!-- Statue -->
            <div class="glass rounded-[32px] overflow-hidden p-2">
                <img src="https://images.unsplash.com/photo-1554188248-986adbb73be4?q=80&w=1000" class="w-full h-48 object-cover rounded-[24px] opacity-70">
                <div class="p-4"><h3 class="text-lg renaissance-font">Anatomy</h3></div>
            </div>

            <!-- Flowers -->
            <div class="glass rounded-[32px] overflow-hidden p-2">
                <img src="https://images.unsplash.com/photo-1580136608260-42d1c4bc7073?q=80&w=1000" class="w-full h-48 object-cover rounded-[24px] opacity-70">
                <div class="p-4"><h3 class="text-lg renaissance-font">Still Life</h3></div>
            </div>
        </div>

    </section>

    <footer class="p-20 text-center opacity-30 text-[10px] tracking-[0.5em] uppercase">
        Futurisite © 2026
    </footer>

</body>
</html>
