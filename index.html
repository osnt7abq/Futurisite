<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Nova Horizon // Learn & Build</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#000;--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a28;
  --purple:#6d28d9;--violet:#8b5cf6;--magenta:#d946ef;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#0ea5e9;
  --white:#fff;--gray:#71717a;--dim:#3f3f46;
  --border:rgba(255,255,255,0.07);
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--black);color:var(--white);overflow:hidden;}

/* ══════════════════════════════
   SCREEN ROUTER
══════════════════════════════ */
.screen{display:none;height:100vh;flex-direction:column;}
.screen.active{display:flex;}
#pg-landing{overflow-y:auto;overflow-x:hidden;}

/* ══════════════════════════════
   SHARED
══════════════════════════════ */
.btn{padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-ghost{background:transparent;color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.12);}
.btn-ghost:hover{color:#fff;border-color:rgba(255,255,255,.3);}
.btn-purple{background:linear-gradient(135deg,#6d28d9,#d946ef);color:#fff;box-shadow:0 4px 16px rgba(109,40,217,.35);}
.btn-purple:hover{transform:translateY(-1px);}

/* ══════════════════════════════
   LANDING — NAV
══════════════════════════════ */
.land-nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:64px;
  background:rgba(0,0,0,.92);border-bottom:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(16px);flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-box{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#6d28d9,#d946ef);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;box-shadow:0 0 20px rgba(109,40,217,.45);}
.logo-name{font-weight:800;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;}
.nav-links{display:flex;gap:28px;list-style:none;}
.nav-links a{font-size:14px;font-weight:500;color:rgba(255,255,255,.45);text-decoration:none;cursor:pointer;transition:color .2s;}
.nav-links a:hover{color:#fff;}
.nav-right{display:flex;align-items:center;gap:14px;}
.nav-status{display:flex;flex-direction:column;align-items:flex-end;line-height:1.3;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--violet);box-shadow:0 0 8px var(--violet);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.stxt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--violet);letter-spacing:1.5px;}
#nav-clock{font-family:'JetBrains Mono',monospace;font-size:15px;color:rgba(255,255,255,.8);letter-spacing:1px;}
.nav-btns{display:flex;gap:8px;}

/* LANDING HERO */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:100px 24px 80px;
  position:relative;background:#000;
}
.hero::before{content:'';position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(109,40,217,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(109,40,217,.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.orb1{width:600px;height:600px;background:#6d28d9;opacity:.12;top:-100px;left:-150px;}
.orb2{width:500px;height:500px;background:#d946ef;opacity:.1;bottom:-100px;right:-100px;}
.hero>*{position:relative;z-index:2;}
.summer-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(139,92,246,.35);background:rgba(109,40,217,.1);padding:7px 18px;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--violet);margin-bottom:14px;}
.ide-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);padding:6px 16px;border-radius:100px;font-size:12px;color:rgba(255,255,255,.45);margin-bottom:32px;}
.gpill-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite;}
.hero-h{font-size:clamp(40px,9vw,100px);font-weight:900;line-height:1.05;letter-spacing:clamp(-1px,-0.02em,0px);margin-bottom:24px;max-width:860px;}
.hero-h .wh{color:#fff !important;-webkit-text-fill-color:#fff !important;display:block;}
.hero-h .wg{display:block;background:linear-gradient(135deg,#8b5cf6,#d946ef,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:#8b5cf6;}
.hero-sub{font-size:clamp(15px,2vw,19px);color:rgba(255,255,255,.5);line-height:1.75;max-width:520px;margin-bottom:44px;}
.hero-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px;}
.btn-start{padding:18px;border-radius:12px;background:linear-gradient(135deg,#6d28d9,#d946ef);border:none;font-size:16px;font-weight:700;color:#fff;cursor:pointer;font-family:'Inter',sans-serif;transition:all .3s;box-shadow:0 8px 32px rgba(109,40,217,.4);}
.btn-start:hover{transform:translateY(-2px);}
.btn-explore{padding:17px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);font-size:16px;font-weight:700;color:rgba(255,255,255,.75);cursor:pointer;font-family:'Inter',sans-serif;transition:all .3s;}
.btn-explore:hover{background:rgba(255,255,255,.1);color:#fff;}

/* SECTIONS */
.sec{padding:80px 0;}
.sec-in{max-width:1160px;margin:0 auto;padding:0 40px;}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--violet);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';width:20px;height:1px;background:var(--violet);}
.sec-title{font-size:clamp(26px,4vw,44px);font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:40px;}
.sec-title span{background:linear-gradient(135deg,var(--violet),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.paths{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.path{background:#111;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:28px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.path::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--magenta));transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.path:hover{transform:translateY(-5px);border-color:rgba(139,92,246,.35);}
.path:hover::after{transform:scaleX(1);}
.path-icon{width:48px;height:48px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px;}
.path-title{font-size:18px;font-weight:800;margin-bottom:8px;}
.path-desc{font-size:13px;color:rgba(255,255,255,.42);line-height:1.65;margin-bottom:16px;}
.path-mod{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--violet);padding:4px 12px;border:1px solid rgba(139,92,246,.2);border-radius:100px;background:rgba(109,40,217,.08);}
.stats-band{background:rgba(255,255,255,.01);border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05);padding:48px 40px;}
.stats-row{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);}
.stat{text-align:center;padding:0 16px;border-right:1px solid rgba(255,255,255,.05);}
.stat:last-child{border-right:none;}
.stat-n{font-size:40px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--violet),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-l{font-size:13px;color:rgba(255,255,255,.3);margin-top:4px;}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.bc{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:20px;text-align:center;transition:all .25s;}
.bc:hover{border-color:rgba(139,92,246,.35);background:rgba(109,40,217,.07);transform:translateY(-3px);}
.prow{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start;}
.plan{background:#111;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:28px;}
.plan.hot{border-color:rgba(139,92,246,.4);background:rgba(109,40,217,.07);transform:scale(1.03);position:relative;}
.hot-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--purple),var(--magenta));padding:3px 14px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:1px;white-space:nowrap;}
.plan-tier{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:12px;}
.plan-amt{font-size:48px;font-weight:900;letter-spacing:-2px;}
.plan-amt.g{background:linear-gradient(135deg,var(--violet),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.plan-per{font-size:14px;color:var(--gray);}
.plan-tag{font-size:12px;color:var(--magenta);font-weight:600;}
.plan-blurb{font-size:13px;color:rgba(255,255,255,.38);line-height:1.6;margin-bottom:20px;margin-top:6px;}
.pfeats{display:flex;flex-direction:column;gap:9px;margin-bottom:24px;}
.pf{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.6);}
.pf.off{color:rgba(255,255,255,.22);}
.pfy{color:var(--green);}.pfn{color:#3f3f46;}
.plan-btn{width:100%;padding:12px;border-radius:9px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;}
.pbg{background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12);}
.pbg:hover{color:#fff;}
.pbh{background:linear-gradient(135deg,var(--purple),var(--magenta));color:#fff;}
.pbh:hover{transform:translateY(-1px);}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px;}
.chip{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:100px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);font-size:13px;color:rgba(255,255,255,.55);}
.chip:hover{border-color:rgba(139,92,246,.4);color:#fff;}
.chip-c{width:8px;height:8px;border-radius:50%;}
.trow{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.tc{background:#111;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px;transition:border-color .2s;}
.tc:hover{border-color:rgba(139,92,246,.22);}
.tc-stars{color:#fbbf24;font-size:12px;margin-bottom:12px;}
.tc-text{font-size:13px;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:16px;}
.tc-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;}
.cta-wrap{max-width:1160px;margin:0 auto;padding:0 40px 80px;}
.cta{background:linear-gradient(135deg,rgba(109,40,217,.16),rgba(217,70,239,.08));border:1px solid rgba(139,92,246,.2);border-radius:22px;padding:64px 40px;text-align:center;position:relative;overflow:hidden;}
.cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(109,40,217,.18),transparent 65%);pointer-events:none;}
.cta-title{font-size:clamp(26px,4vw,42px);font-weight:900;letter-spacing:-1px;line-height:1.15;margin-bottom:12px;position:relative;z-index:1;}
.cta-title span{background:linear-gradient(135deg,var(--violet),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cta-sub{font-size:15px;color:rgba(255,255,255,.42);max-width:380px;margin:0 auto 32px;line-height:1.7;position:relative;z-index:1;}
.cta-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;}
footer{border-top:1px solid rgba(255,255,255,.06);padding:22px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.7);flex-shrink:0;}
.flbox{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#6d28d9,#d946ef);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;}
.flinks a{font-size:12px;color:rgba(255,255,255,.3);text-decoration:none;margin-left:18px;}
.flinks a:hover{color:rgba(255,255,255,.6);}

/* ══════════════════════════════════════════
   IDE SCREEN — full page with bottom tab bar
══════════════════════════════════════════ */
#pg-ide{background:var(--bg);}

/* IDE Top Bar */
.ide-top{
  height:52px;background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 14px;gap:10px;flex-shrink:0;
}
.back-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.back-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
.ide-logo-sm{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#6d28d9,#d946ef);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0;}
.proj-inp{background:transparent;border:none;color:rgba(255,255,255,.8);font-size:13px;font-weight:600;font-family:'Inter',sans-serif;outline:none;flex:1;min-width:0;border-bottom:1px solid transparent;transition:border .2s;}
.proj-inp:focus{border-bottom-color:var(--violet);}
.lang-sel{background:var(--bg3);border:1px solid var(--border);color:#fff;font-size:12px;font-family:'Inter',sans-serif;padding:5px 10px;border-radius:6px;outline:none;cursor:pointer;flex-shrink:0;}
.lang-sel option{background:#1a1a28;}
.run-btn{padding:7px 18px;border-radius:7px;background:var(--green);color:#000;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;flex-shrink:0;}
.run-btn:hover{background:#16a34a;}
.save-dot{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--green);flex-shrink:0;}

/* IDE TAB CONTENT AREA */
.ide-content{flex:1;overflow:hidden;position:relative;}
.ide-tab-page{display:none;height:100%;flex-direction:column;overflow:hidden;}
.ide-tab-page.active{display:flex;}

/* ── CODE TAB ── */
.editor-wrap{flex:1;display:flex;overflow:hidden;}
.line-nums{background:var(--bg);padding:14px 8px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.65;color:var(--dim);text-align:right;user-select:none;flex-shrink:0;min-width:40px;overflow:hidden;}
#code-ed{flex:1;padding:14px 16px;resize:none;background:var(--bg);border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.65;color:#e2e8f0;overflow-y:auto;tab-size:2;white-space:pre;overflow-wrap:normal;}
.code-file-tabs{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.cftab{display:flex;align-items:center;gap:5px;padding:8px 14px;font-size:12px;color:var(--gray);cursor:pointer;border-right:1px solid var(--border);white-space:nowrap;font-family:'JetBrains Mono',monospace;transition:all .15s;flex-shrink:0;}
.cftab.on{background:var(--bg);color:#fff;border-bottom:2px solid var(--violet);margin-bottom:-1px;}
.cftab-x{width:13px;height:13px;border:none;background:none;color:var(--dim);cursor:pointer;font-size:11px;border-radius:3px;}
.cftab-x:hover{background:rgba(255,255,255,.1);color:#fff;}
.output-strip{height:140px;flex-shrink:0;border-top:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}
.output-head{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.output-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:6px;}
.out-body{flex:1;overflow-y:auto;padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.8;}
.ol{color:rgba(255,255,255,.65);}.oe{color:var(--red);}.oi{color:var(--violet);}.os{color:var(--green);}

/* ── AI TAB — FULL PAGE CHAT ── */
.ai-page{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.ai-page-head{
  padding:20px 20px 16px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.ai-page-title{display:flex;align-items:center;gap:12px;}
.ai-avatar-big{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#6d28d9,#d946ef);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;box-shadow:0 0 16px rgba(109,40,217,.5);}
.ai-name{font-size:17px;font-weight:800;}
.ai-status{font-size:12px;color:var(--green);display:flex;align-items:center;gap:5px;margin-top:2px;}
.ai-status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 1.5s ease-in-out infinite;}
/* Mode tabs */
.ai-modes{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;}
.ai-mode{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.45);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.ai-mode.on{background:rgba(109,40,217,.2);border-color:rgba(139,92,246,.4);color:var(--violet);}
/* Messages */
.ai-msgs{flex:1;overflow-y:auto;padding:16px;}
.ai-msg-wrap{display:flex;gap:10px;margin-bottom:16px;align-items:flex-start;}
.ai-msg-wrap.user{flex-direction:row-reverse;}
.ai-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.ai-av.bot{background:linear-gradient(135deg,#6d28d9,#d946ef);}
.ai-av.usr{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}
.ai-bubble{max-width:80%;padding:12px 15px;border-radius:16px;font-size:14px;line-height:1.7;color:rgba(255,255,255,.85);}
.ai-bubble.bot{background:rgba(109,40,217,.12);border:1px solid rgba(139,92,246,.2);border-radius:4px 16px 16px 16px;}
.ai-bubble.usr{background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.3);border-radius:16px 4px 16px 16px;}
.ai-bubble pre{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(0,0,0,.5);padding:10px 12px;border-radius:8px;margin:8px 0;overflow-x:auto;white-space:pre-wrap;color:#e2e8f0;border:1px solid rgba(255,255,255,.06);}
.ai-bubble code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(0,0,0,.4);padding:1px 5px;border-radius:4px;color:#c084fc;}
.ai-bubble strong{color:#fff;font-weight:700;}
/* Typing dots */
.typing-row{display:none;align-items:center;gap:10px;padding:0 16px 10px;}
.typing-row.show{display:flex;}
.tdots span{width:6px;height:6px;border-radius:50%;background:var(--violet);display:inline-block;margin:0 2px;animation:tdot 1.2s ease-in-out infinite;}
.tdots span:nth-child(2){animation-delay:.2s;}
.tdots span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
/* Quick chips */
.ai-quick{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;flex-shrink:0;border-top:1px solid var(--border);}
.ai-quick::-webkit-scrollbar{display:none;}
.qchip{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500;border:1px solid rgba(139,92,246,.2);background:rgba(109,40,217,.06);color:var(--violet);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.qchip:hover{background:rgba(109,40,217,.18);}
/* Input */
.ai-inp-row{display:flex;gap:8px;padding:12px 14p
